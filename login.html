<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — OversightAI</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo">OversightAI</div>
                <h2>Welcome Back</h2>
                <p>Log in to your dashboard</p>
            </div>

            <!-- ── SIMPLE FORM ── -->
            <form id="authForm" method="POST" action="/api/login">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@company.com" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required />
                </div>

                <button type="submit" class="btn-primary full-width" id="authButton">Log In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="#" id="toggleLink">Sign up</a></p>
            </div>
        </div>
    </div>

    <script>
        // ── GET ELEMENTS ──
        const form = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const toggleLink = document.getElementById('toggleLink');

        console.log('✅ login.html loaded');
        console.log('📝 Form element:', form);
        console.log('📧 Email input:', emailInput);
        console.log('🔐 Password input:', passwordInput);

        // ── TOGGLE LOGIN/SIGNUP ──
        let isLogin = true;
        toggleLink.addEventListener('click', function(e) {
            e.preventDefault();
            isLogin = !isLogin;
            if (isLogin) {
                document.querySelector('.auth-header h2').textContent = 'Welcome Back';
                document.querySelector('.auth-header p').textContent = 'Log in to your dashboard';
                document.getElementById('authButton').textContent = 'Log In';
                toggleLink.textContent = 'Sign up';
                toggleLink.parentElement.innerHTML = `Don't have an account? <a href="#" id="toggleLink">Sign up</a>`;
                document.getElementById('authForm').action = '/api/login';
            } else {
                document.querySelector('.auth-header h2').textContent = 'Create Your Account';
                document.querySelector('.auth-header p').textContent = 'Start monitoring your AI today';
                document.getElementById('authButton').textContent = 'Sign Up';
                toggleLink.parentElement.innerHTML = `Already have an account? <a href="#" id="toggleLink">Log in</a>`;
                document.getElementById('authForm').action = '/api/signup';
            }
            document.getElementById('toggleLink').addEventListener('click', arguments.callee);
        });

        // ── FORM SUBMIT ──
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('✅ Form submitted!');
            console.log('📧 Email:', emailInput.value);
            console.log('🔐 Password:', passwordInput.value ? '✅ Provided' : '❌ Missing');

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                alert('Please fill in all fields.');
                return;
            }

            // ── Send to backend ──
            fetch(form.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            })
            .then(response => {
                console.log('📨 Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('📄 Response data:', data);
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || 'Login failed');
                }
            })
            .catch(error => {
                console.error('❌ Network error:', error);
                alert('Network error. Make sure the server is running.');
            });
        });
    </script>
</body>
</html>
