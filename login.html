<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — OversightAI</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo">OversightAI</div>
                <h2 id="formTitle">Welcome Back</h2>
                <p id="formSubtitle">Log in to your dashboard</p>
            </div>

            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@company.com" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>
                <div class="form-group" id="companyGroup" style="display:none;">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" placeholder="Your company name" />
                </div>

                <!-- ✅ LEGAL CHECKBOX (only shows on Sign Up) -->
                <div class="form-group" id="termsGroup" style="display: none; margin-top: 8px;">
                    <div style="display: flex; align-items: flex-start; gap: 10px;">
                        <input type="checkbox" id="agreeTerms" style="width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0;">
                        <label for="agreeTerms" style="font-size: 0.9rem; color: #4a5a72; font-weight: normal; cursor: pointer; line-height: 1.5;">
                            I agree to the <a href="terms.html" target="_blank" style="color: #0066ff; text-decoration: underline;">Terms & Conditions</a> and
                            <a href="privacy.html" target="_blank" style="color: #0066ff; text-decoration: underline;">Privacy Policy</a>.
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-primary full-width" id="authButton">Log In</button>
            </form>

            <div class="auth-footer">
                <p id="toggleText">Don't have an account? <a href="#" id="toggleLink">Sign up</a></p>
            </div>
        </div>
    </div>

    <script>
        // ── Elements ──
        const form = document.getElementById('authForm');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const companyName = document.getElementById('companyName');
        const companyGroup = document.getElementById('companyGroup');
        const termsGroup = document.getElementById('termsGroup');
        const agreeTerms = document.getElementById('agreeTerms');
        const toggleLink = document.getElementById('toggleLink');
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const authButton = document.getElementById('authButton');
        const toggleText = document.getElementById('toggleText');

        let isLogin = true;

        // ── Toggle ──
        toggleLink.addEventListener('click', function(e) {
            e.preventDefault();
            isLogin = !isLogin;

            if (isLogin) {
                formTitle.textContent = 'Welcome Back';
                formSubtitle.textContent = 'Log in to your dashboard';
                authButton.textContent = 'Log In';
                toggleText.innerHTML = `Don't have an account? <a href="#" id="toggleLink">Sign up</a>`;
                companyGroup.style.display = 'none';
                termsGroup.style.display = 'none';
            } else {
                formTitle.textContent = 'Create Your Account';
                formSubtitle.textContent = 'Start monitoring your AI today';
                authButton.textContent = 'Sign Up';
                toggleText.innerHTML = `Already have an account? <a href="#" id="toggleLink">Log in</a>`;
                companyGroup.style.display = 'block';
                termsGroup.style.display = 'block';
            }

            // Re-bind toggle link
            document.getElementById('toggleLink').addEventListener('click', arguments.callee);
        });

        // ── Submit ──
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const emailValue = email.value.trim();
            const passwordValue = password.value.trim();
            const companyValue = companyName.value.trim();

            // ── ✅ Validate checkbox for signup ──
            if (!isLogin && !agreeTerms.checked) {
                alert('You must agree to the Terms & Conditions and Privacy Policy to create an account.');
                return;
            }

            const endpoint = isLogin ? '/api/login' : '/api/signup';
            const body = isLogin ? { email: emailValue, password: passwordValue } : { email: emailValue, password: passwordValue, companyName: companyValue };

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (err) {
                alert('Network error. Is the server running?');
                console.error(err);
            }
        });
    </script>
</body>
</html>
