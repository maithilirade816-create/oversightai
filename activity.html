<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Log — OversightAI</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <aside class="sidebar">
        <div class="logo">OversightAI</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="activity.html" class="active">📋 Activity Log</a>
            <a href="security.html">🛡️ Security</a>
            <a href="support.html">💬 Support</a>
            <a href="settings.html">⚙️ Settings</a>
        </nav>
        <div class="sidebar-user">
            <span id="userEmail">User</span>
            <button id="logoutBtn">Logout</button>
        </div>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <h1>Activity Log</h1>
            <button id="refreshBtn">🔄 Refresh</button>
        </header>

        <div id="output" style="padding:20px; background:white; border-radius:12px;">
            Loading...
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        document.getElementById('userEmail').textContent = JSON.parse(localStorage.getItem('user') || '{}').email || 'User';

        async function loadData() {
            const output = document.getElementById('output');
            output.innerHTML = '⏳ Loading...';

            try {
                const res = await fetch('https://oversightai.onrender.com/api/dashboard', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                    return;
                }

                const data = await res.json();
                output.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;

            } catch (err) {
                output.innerHTML = `❌ Error: ${err.message}`;
            }
        }

        document.getElementById('refreshBtn').addEventListener('click', loadData);
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        loadData();
    </script>
</body>
</html>
