<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Activity Log — OversightAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">OversightAI</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="activity.html" class="active">Activity Log</a>
            <a href="security.html">Security</a>
            <a href="support.html">Support</a>
            <a href="settings.html">Settings</a>
        </nav>
        <div class="sidebar-user">
            <span id="userEmail">User</span>
            <button id="logoutBtn">Logout</button>
        </div>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <h1>Activity Log</h1>
            <button id="refreshBtn">Refresh</button>
        </header>

        <!-- ── THIS IS WHERE DATA GOES ── -->
        <div id="output" style="padding:20px; background:white; border-radius:12px; margin-top:20px; font-family:monospace;">
            Loading...
        </div>
    </main>

    <script>
        console.log('Script is running!');

        var token = localStorage.getItem('token');
        if (!token) {
            console.log('No token found, redirecting...');
            window.location.href = 'login.html';
        }

        var user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.email) {
            document.getElementById('userEmail').textContent = user.email;
        }

        function loadData() {
            var output = document.getElementById('output');
            output.innerHTML = 'Loading...';
            console.log('Fetching activity data...');

            fetch('https://oversightai.onrender.com/api/dashboard', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(function(response) {
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                    return;
                }
                return response.json();
            })
            .then(function(data) {
                console.log('Data received:', data);
                // ── DISPLAY THE DATA ──
                var html = '<h3>Metrics</h3>';
                html += '<ul>';
                html += '<li>Total Requests: ' + (data.metrics.totalRequests || 0) + '</li>';
                html += '<li>Leaks Blocked: ' + (data.metrics.leaksBlocked || 0) + '</li>';
                html += '<li>Active Agents: ' + (data.metrics.activeAgents || 0) + '</li>';
                html += '<li>Alerts: ' + (data.metrics.alerts || 0) + '</li>';
                html += '</ul>';

                html += '<h3>Activity</h3>';
                if (data.activity && data.activity.length > 0) {
                    html += '<table border="1" cellpadding="8" style="width:100%; border-collapse:collapse;">';
                    html += '<tr><th>User</th><th>Tool</th><th>Prompt</th><th>Status</th><th>Time</th></tr>';
                    data.activity.forEach(function(item) {
                        html += '<tr>';
                        html += '<td>' + (item.user || 'Unknown') + '</td>';
                        html += '<td>' + (item.tool || 'Unknown') + '</td>';
                        html += '<td>' + (item.prompt || '') + '</td>';
                        html += '<td>' + (item.status || 'Unknown') + '</td>';
                        html += '<td>' + (item.time || 'Just now') + '</td>';
                        html += '</tr>';
                    });
                    html += '</table>';
                } else {
                    html += '<p>No activity yet.</p>';
                }

                output.innerHTML = html;
            })
            .catch(function(error) {
                console.error('Error:', error);
                output.innerHTML = 'Error: ' + error.message;
            });
        }

        document.getElementById('refreshBtn').addEventListener('click', loadData);
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        loadData();
    </script>
</body>
</html>
