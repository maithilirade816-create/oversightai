<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support — OversightAI</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <nav>
        <div class="container nav-container">
            <div class="logo">OversightAI</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="support.html" class="active">Support</a></li>
                <li><a href="login.html" class="btn-outline">Log In</a></li>
            </ul>
        </div>
    </nav>

    <section class="support-section">
        <div class="container">
            <h1>💬 Support Center</h1>
            <p>We're here to help. Reach out anytime.</p>
            <div class="support-grid">
                <!-- ── Email Support Card ── -->
                <div class="support-card">
                    <h3>📧 Email Support</h3>
                    <p>For general inquiries and troubleshooting:</p>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px;">
                        <button onclick="copyEmail()" class="btn-primary">📋 Copy Email</button>
                        <a href="mailto:oversightai.contact@gmail.com" class="btn-outline">📧 Open Email</a>
                    </div>
                </div>

                <div class="support-card">
                    <h3>📞 Live Chat</h3>
                    <p>Coming soon!</p>
                    <button class="btn-primary" onclick="alert('Live chat coming soon!')">Start Chat</button>
                </div>

                <div class="support-card">
                    <h3>📚 Documentation</h3>
                    <p>How to set up OversightAI:</p>
                    <a href="#" class="btn-outline">Read Docs</a>
                </div>
            </div>
        </div>
    </section>

    <style>
        .support-section { padding: 60px 0; background: #f8fafc; min-height: 70vh; }
        .support-section h1 { font-size: 2.5rem; margin-bottom: 8px; }
        .support-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 32px; }
        .support-card { background: white; padding: 32px; border-radius: 12px; border: 1px solid #e9edf3; }
        @media (max-width: 768px) { .support-grid { grid-template-columns: 1fr; } }
    </style>

    <script>
        function copyEmail() {
            const email = 'oversightai.contact@gmail.com';
            navigator.clipboard.writeText(email).then(() => {
                alert('✅ Email copied to clipboard!');
            }).catch(() => {
                alert('❌ Could not copy. Please copy manually.');
            });
        }
    </script>

    <script src="app.js"></script>
</body>
</html>
