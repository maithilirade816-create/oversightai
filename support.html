<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support — OversightAI</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <aside class="sidebar">
        <div class="logo">OversightAI</div>
        <nav class="sidebar-nav">
            <a href="/dashboard.html">📊 Dashboard</a>
            <a href="/activity.html">📋 Activity Log</a>
            <a href="/security.html">🛡️ Security</a>
            <a href="/support.html" class="active">💬 Support</a>
            <a href="/settings.html">⚙️ Settings</a>
        </nav>
        <div class="sidebar-user">
            <span id="userEmail">User</span>
            <button id="logoutBtn">Logout</button>
        </div>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <h1>💬 Support Center</h1>
            <div class="header-actions">
                <span class="status-badge">🟢 We're here to help</span>
            </div>
        </header>

        <section style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; margin-top: 20px;">
            <div style="background: white; padding: 32px; border-radius: 12px; border: 1px solid #e9edf3;">
                <h3>📧 Email Support</h3>
                <p style="color: #4a5a72;">For general inquiries and troubleshooting:</p>
                <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px;">
                    <button onclick="copyEmail()" style="background: #0066ff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600;">
                        📋 Copy Email
                    </button>
                    <a href="mailto:oversightai.contact@gmail.com" style="background: transparent; color: #0a1929; padding: 10px 20px; border-radius: 6px; border: 2px solid #d0d9e6; text-decoration: none; font-weight: 600; display: inline-block;">
                        📧 Open Email
                    </a>
                </div>
            </div>
            <div style="background: white; padding: 32px; border-radius: 12px; border: 1px solid #e9edf3;">
                <h3>📞 Live Chat</h3>
                <p style="color: #4a5a72;">Coming soon!</p>
                <button onclick="alert('Live chat coming soon!')" style="background: #0066ff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600;">
                    Start Chat
                </button>
            </div>
            <div style="background: white; padding: 32px; border-radius: 12px; border: 1px solid #e9edf3;">
                <h3>📚 Documentation</h3>
                <p style="color: #4a5a72;">How to set up OversightAI:</p>
                <a href="#" style="background: transparent; color: #0a1929; padding: 10px 20px; border-radius: 6px; border: 2px solid #d0d9e6; text-decoration: none; font-weight: 600; display: inline-block;">
                    Read Docs
                </a>
            </div>
        </section>
    </main>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.email) document.getElementById('userEmail').textContent = user.email;

        function copyEmail() {
            navigator.clipboard.writeText('oversightai.contact@gmail.com').then(() => {
                alert('✅ Email copied!');
            }).catch(() => {
                alert('❌ Could not copy. Please copy manually.');
            });
        }

        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
